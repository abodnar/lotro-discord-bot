name: Deploy to NAS

env:
  CONTAINER_NAME: lotro-bot
  IMAGE_NAME: lotro-bot

on:
  push:
    branches: [master]
    paths:
      - 'source/**'
      - 'dockerfile'
      - 'requirements.txt'
      - '.forgejo/workflows/deploy.yml'

jobs:
  lint:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout
        run: git clone --depth 1 --branch ${GITHUB_REF_NAME} http://192.168.86.46:3000/${GITHUB_REPOSITORY}.git repo

      - name: Lint Dockerfile
        run: docker run --rm -i hadolint/hadolint < repo/dockerfile

  bump-version:
    runs-on: self-hosted
    needs: lint
    timeout-minutes: 5
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout with history
        run: git clone --depth 50 --branch ${GITHUB_REF_NAME} http://192.168.86.46:3000/${GITHUB_REPOSITORY}.git repo

      - name: Bump version
        id: bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd repo

          # Read current version
          CURRENT=$(sed -n 's/__version__ = "\(.*\)"/\1/p' source/__init__.py)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Find commits since last version bump (or last 50 if no bump commit found)
          LAST_BUMP=$(git log --format="%H %s" | grep -m1 "chore: bump version" | awk '{print $1}' || true)
          if [ -n "$LAST_BUMP" ]; then
            COMMITS=$(git log --format="%s" "${LAST_BUMP}..HEAD")
          else
            COMMITS=$(git log --format="%s" -50)
          fi

          # Determine bump level from conventional commit prefixes
          BUMP="patch"
          if echo "$COMMITS" | grep -qE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^(feat|feature)(\(.+\))?:"; then
            BUMP="minor"
          fi

          case $BUMP in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"

          echo "Bumping ${CURRENT} → ${NEW} (${BUMP})"
          sed -i "s/__version__ = \"${CURRENT}\"/__version__ = \"${NEW}\"/" source/__init__.py

          git config user.email "ci@forgejo-nas"
          git config user.name "Forgejo CI"
          git add source/__init__.py
          git commit -m "chore: bump version to ${NEW} [skip ci]"
          git push http://x-token-auth:${GITHUB_TOKEN}@192.168.86.46:3000/${GITHUB_REPOSITORY}.git ${GITHUB_REF_NAME}

          echo "version=${NEW}" >> ${GITHUB_OUTPUT}

  deploy:
    runs-on: self-hosted
    needs: bump-version
    timeout-minutes: 15
    steps:
      - name: Checkout (with bumped version)
        run: git clone --depth 1 --branch ${GITHUB_REF_NAME} http://192.168.86.46:3000/${GITHUB_REPOSITORY}.git repo

      - name: Build image
        run: docker build -t ${IMAGE_NAME}:latest repo

      - name: Redeploy container
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          SERVER_TZ: ${{ secrets.SERVER_TZ }}
        run: |
          mkdir -p /volume1/docker/${CONTAINER_NAME}
          docker stop ${CONTAINER_NAME} || true
          docker rm   ${CONTAINER_NAME} || true
          docker run -d \
            --name ${CONTAINER_NAME} \
            --restart unless-stopped \
            -e BOT_TOKEN="${BOT_TOKEN}" \
            -e SERVER_TZ="${SERVER_TZ}" \
            -e LANGUAGE=en \
            -e DB_PATH=/data/raid_db \
            -v /volume1/docker/${CONTAINER_NAME}:/data \
            ${IMAGE_NAME}:latest

      - name: Verify container is running
        run: |
          sleep 8
          docker ps --filter name=${CONTAINER_NAME} --format '{{.Names}} {{.Status}}'
          docker logs --tail 15 ${CONTAINER_NAME}

  cleanup-images:
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Prune dangling images
        run: docker image prune -f

  notify-failure:
    runs-on: self-hosted
    needs: [lint, bump-version, deploy]
    if: failure()
    env:
      FORGEJO_TOKEN: ${{ secrets.API_TOKEN }}
    steps:
      - name: Open failure issue
        run: |
          docker run --rm \
            -e FORGEJO_TOKEN="${FORGEJO_TOKEN}" \
            -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            -e GITHUB_SHA="${GITHUB_SHA}" \
            -e GITHUB_WORKFLOW="${GITHUB_WORKFLOW}" \
            python:3.12-slim python3 - << 'PYEOF'
          import json, os
          from urllib.request import Request, urlopen

          token = os.environ["FORGEJO_TOKEN"]
          repo  = os.environ["GITHUB_REPOSITORY"]
          sha   = os.environ["GITHUB_SHA"][:7]
          wf    = os.environ["GITHUB_WORKFLOW"]
          base  = f"http://192.168.86.46:3000/api/v1/repos/{repo}"
          hdrs  = {"Authorization": f"token {token}", "Content-Type": "application/json"}

          body = json.dumps({
              "title": f"Deploy failed: {sha}",
              "body": (
                  f"Workflow **{wf}** failed on commit `{sha}`.\n\n"
                  f"Check the [Actions log](http://192.168.86.46:3000/{repo}/actions)."
              ),
          }).encode()
          urlopen(Request(base + "/issues", data=body, headers=hdrs, method="POST"))
          print(f"Opened failure issue for {sha}")
          PYEOF
